{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login - SabaStyle Platform{% endblock %}

{% block content %}
<style>
    .auth-container {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .auth-card {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 79, 163, 0.1);
        border-radius: 40px;
        box-shadow: 0 30px 60px rgba(0,0,0,0.1);
        overflow: hidden;
        animation: fadeIn 0.8s ease-out;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .auth-header {
        background: linear-gradient(135deg, var(--primary-pink), var(--secondary-pink));
        padding: 40px;
        text-align: center;
        color: white;
    }
    .auth-body {
        padding: 40px 50px;
    }
    .brand-text-auth {
        font-family: 'Playfair Display', serif;
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 5px;
    }
</style>

<div class="auth-container">
    <div class="col-md-5">
        <div class="auth-card">
            <div class="auth-header">
                <div class="brand-text-auth">SabaStyle</div>
                <p class="mb-0 opacity-75">Welcome back to luxury</p>
            </div>
            <div class="auth-body">
                <h2 class="fw-bold mb-4 text-center">Sign In</h2>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill mt-4 shadow">
                        Access Store
                    </button>
                </form>
                <div class="text-center mt-5">
                    <p class="text-muted">New to SabaStyle? <a href="{% url 'accounts:signup' %}" class="text-pink fw-bold">Create Account</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
